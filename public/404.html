<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sohin S. Doshi</title>
    <script type="text/javascript">
      // Redirect GitHub Pages 404s back to the SPA with the path encoded in the query string.
      // The SPA's index.html decodes it and restores the correct history entry.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
